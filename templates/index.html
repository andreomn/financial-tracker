<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CVM DFP Finder</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#f4f7fb; margin:0; color:#1f2937; }
    .wrap { max-width: 1100px; margin: 30px auto; background:#fff; border-radius:16px; padding:28px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    .row { display:flex; gap:10px; margin-top:18px; }
    input { flex:1; padding:14px 16px; border:1px solid #d1d5db; border-radius:10px; font-size:16px; }
    button { padding:10px 14px; border:0; background:#2563eb; color:white; border-radius:10px; font-weight:600; cursor:pointer; }
    .hidden { display:none; }
    table { width:100%; border-collapse:collapse; margin-top:14px; }
    th, td { border-bottom:1px solid #e5e7eb; padding:8px; text-align:left; font-size:13px; }
    .split { display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px; }
    .box { border:1px solid #e5e7eb; border-radius:12px; padding:12px; min-height:420px; }
    .pager { display:flex; gap:8px; align-items:center; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Consulta DFP na CVM</h1>
    <p>Digite o nome da empresa e pressione Enter para buscar as últimas DFPs por código CVM.</p>
    <form id="formBusca" class="row">
      <input id="empresa" list="sugestoesEmpresas" placeholder="Ex: Petrobras" required />
      <datalist id="sugestoesEmpresas"></datalist>
      <button type="submit">Buscar</button>
    </form>
    <div id="status"></div>
    <div class="hidden" id="downloadArea"><button id="downloadExcel" type="button">Baixar Excel consolidado</button></div>

    <div class="split">
      <div class="box">
        <h3>DFPs encontradas</h3>
        <table id="tabela" class="hidden"><thead><tr><th>#</th><th>Link DFP</th></tr></thead><tbody></tbody></table>
      </div>

      <div class="box">
        <h3>Empresas CVM (código + nome)</h3>
        <div id="empresasMeta" style="font-size:12px;color:#6b7280"></div>
        <table id="empresasTabela">
          <thead><tr><th>Código</th><th>Empresa</th><th>Situação</th></tr></thead>
          <tbody id="empresasBody"></tbody>
        </table>
        <div class="pager">
          <button id="prevPage" type="button">◀ Anterior</button>
          <span id="pageInfo"></span>
          <button id="nextPage" type="button">Próxima ▶</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('formBusca');
    const statusEl = document.getElementById('status');
    const tabela = document.getElementById('tabela');
    const tbody = tabela.querySelector('tbody');
    const downloadArea = document.getElementById('downloadArea');
    const btnDownload = document.getElementById('downloadExcel');
    const empresasBody = document.getElementById('empresasBody');
    const empresasMeta = document.getElementById('empresasMeta');
    const pageInfo = document.getElementById('pageInfo');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');
    const empresaInput = document.getElementById('empresa');
    const sugestoes = document.getElementById('sugestoesEmpresas');

    let ultimaEmpresa = '';
    let empresasPage = 1;
    let totalEmpresas = 0;
    let pageSize = 30;

    async function carregarEmpresas(page = 1) {
      empresasBody.innerHTML = '<tr><td colspan="3">Carregando...</td></tr>';
      const resp = await fetch(`/empresas?page=${page}&size=${pageSize}`);
      const data = await resp.json();
      if (!resp.ok) {
        empresasBody.innerHTML = `<tr><td colspan="3">${data.erro || 'Falha ao carregar empresas'}</td></tr>`;
        return;
      }
      empresasPage = data.page;
      totalEmpresas = data.total;
      const totalPages = Math.max(1, Math.ceil(totalEmpresas / data.size));
      empresasMeta.textContent = `Total na CVM: ${totalEmpresas}`;
      pageInfo.textContent = `Página ${empresasPage} de ${totalPages}`;
      prevPage.disabled = empresasPage <= 1;
      nextPage.disabled = empresasPage >= totalPages;

      empresasBody.innerHTML = '';
      data.empresas.forEach((e) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${e.codigo_cvm}</td><td>${e.nome}</td><td>${e.situacao || ''}</td>`;
        empresasBody.appendChild(tr);
      });
    }

    prevPage.addEventListener('click', () => carregarEmpresas(empresasPage - 1));
    nextPage.addEventListener('click', () => carregarEmpresas(empresasPage + 1));

    let t;
    empresaInput.addEventListener('input', () => {
      clearTimeout(t);
      t = setTimeout(async () => {
        const q = empresaInput.value.trim();
        const resp = await fetch(`/sugestoes-empresas?q=${encodeURIComponent(q)}&limit=20`);
        const data = await resp.json();
        if (!resp.ok) return;
        sugestoes.innerHTML = '';
        data.sugestoes.forEach((s) => {
          const opt = document.createElement('option');
          opt.value = s.nome;
          opt.label = `${s.nome} (CVM ${s.codigo_cvm})`;
          sugestoes.appendChild(opt);
        });
      }, 250);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const empresa = empresaInput.value.trim();
      if (!empresa) return;
      ultimaEmpresa = empresa;
      statusEl.textContent = 'Consultando CVM...';
      tabela.classList.add('hidden');
      downloadArea.classList.add('hidden');
      tbody.innerHTML = '';

      const resp = await fetch('/buscar-dfps', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ empresa }) });
      const data = await resp.json();
      if (!resp.ok) { statusEl.textContent = data.erro || 'Falha na consulta.'; return; }

      statusEl.textContent = `Empresa: ${data.empresa} (CVM ${data.codigo_cvm}) • ${data.links.length} DFP(s) encontradas.`;
      data.links.forEach((link, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${idx + 1}</td><td><a href="${link}" target="_blank">${link}</a></td>`;
        tbody.appendChild(tr);
      });
      tabela.classList.remove('hidden');
      downloadArea.classList.remove('hidden');
    });

    btnDownload.addEventListener('click', async () => {
      if (!ultimaEmpresa) return;
      statusEl.textContent = 'Gerando Excel...';
      const resp = await fetch('/fill-dfp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ empresa: ultimaEmpresa }) });
      if (!resp.ok) { const data = await resp.json(); statusEl.textContent = data.erro || 'Falha ao gerar Excel.'; return; }
      const blob = await resp.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `dfp_cvm_${ultimaEmpresa}.xlsx`; a.click();
      window.URL.revokeObjectURL(url);
      statusEl.textContent = 'Excel gerado com sucesso.';
    });

    carregarEmpresas(1);
  </script>
</body>
</html>
